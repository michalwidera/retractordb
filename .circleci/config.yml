version: 2.1

# https://circleci.com/developer/machine/image/ubuntu-2204#image-tags

parameters:
  run_manual_arm:
    type: boolean
    default: false
  run_manual_nightly_full:
    type: boolean
    default: false

workflows:
  commit:
    jobs:
      - build-debug-ninja-mydocker:
          filters:
            branches:
              only:
                - master
                - /issue_.*/
                - /[0-9]+[-].*/

  nightly-full:
    triggers:
      - schedule:
          # https://crontab.guru/#0_4_5,15_*_*
          # At 04:00 on day-of-month 5 and 15.
          cron: "0 4 5,15 * *"
          filters:
            branches:
              only:
                - master
                - /issue_.*/
    jobs:
      - build-release
      - build-release-ninja-mydocker
      - build-debug-ninja-mydocker
      - build-debug:
          requires:
            - build-release
      - build-debug-ninja:
          requires:
            - build-release
      - build-ARM:
          requires:
            - build-release
  manual-arm:
    when: << pipeline.parameters.run_manual_arm >>
    jobs:
      - build-ARM

  manual-nightly-full:
    when: << pipeline.parameters.run_manual_nightly_full >>
    jobs:
      - build-release
      - build-release-ninja-mydocker
      - build-debug-ninja-mydocker
      - build-debug:
          requires:
            - build-release
      - build-debug-ninja:
          requires:
            - build-release
      - build-ARM:
          requires:
            - build-release

  nightly-partial:
    triggers:
      - schedule:
          # 0 19 * * 1
          # At 19:00 on Monday..
          cron: "0 19 * * 1"
          filters:
            branches:
              only:
                - /issue_.*/
    jobs:
      - build-release-ninja-mydocker
      - build-debug-ninja-mydocker
      - build-ARM:
          filters:
            branches:
              only:
                - /issue_.*/


executors:
  debian-mydocker:
    docker:
      - image: micwide/buildenv-retractordb:latest
    resource_class: large

  ubuntu-docker-2204:
    docker:
      - image: cimg/base:current-22.04
    resource_class: large

  ubuntu-docker:
    docker:
      # Use 'current' to always receive the latest security patches.
      - image: cimg/base:current
    resource_class: large

  ubuntu-machine:
    machine:
      image: ubuntu-2404:2025.09.1
    resource_class: large

  ubuntu-machine-arm:
    machine:
      image: ubuntu-2404:2025.09.1
    resource_class: arm.large

commands:
  check-skipci:
    steps:
      - run:
          name: Check for [skipci] in commit message
          command: |
            if git log -1 --pretty=%B | grep -qF '[skipci]'; then
              echo "Commit message contains [skipci] — skipping CI."
              circleci step halt
            fi

  prep-env-ci:
    parameters:
      use_ninja:
        type: boolean
        default: false
    steps:
      - run:
          name: Install build toolchain (minimal, CI only)
          command: |
            scripts/buildrdb.sh toolchain_required
      - run:
          name: Install Conan toolchain
          command: |
            source ~/.venv/bin/activate
            scripts/buildrdb.sh conan
      - run:
          name: Validate installed toolchain
          command: |
            scripts/buildrdb.sh validate
      - when:
          condition: << parameters.use_ninja >>
          steps:
            - run:
                name: Configure Ninja generator
                command: scripts/buildrdb.sh ninja

  prep-env:
    parameters:
      use_ninja:
        type: boolean
        default: false
    steps:
      - run:
          name: Install toolchain (C++23 verified)
          command: |
            uname -a && cat /proc/version && cat /etc/issue
            scripts/buildrdb.sh toolchain
      - run:
          name: Install Conan toolchain
          command: |
            source ~/.venv/bin/activate
            scripts/buildrdb.sh conan
      - run:
          name: Validate installed toolchain
          command: |
            scripts/buildrdb.sh validate
      - when:
          condition: << parameters.use_ninja >>
          steps:
            - run:
                name: Configure Ninja generator
                command: scripts/buildrdb.sh ninja

  conan-install:
    parameters:
      build_type:
        type: string
        default: "Release"
      build_param:
        type: string
        default: ""
      build_tool:
        type: string
        default: "make"
    steps:
      - run:
          name: Conan install
          command: |
            source ~/.venv/bin/activate
            conan source .
            conan install . -s build_type=<< parameters.build_type >> << parameters.build_param >>
  conan-build:
    parameters:
      build_type:
        type: string
        default: "Release"
      build_param:
        type: string
        default: ""
      build_tool:
        type: string
        default: "make"
    steps:
      - run:
          name: "Conan build (<< parameters.build_tool >>)"
          command: |
            source ~/.venv/bin/activate
            conan build . -s build_type=<<parameters.build_type>> <<parameters.build_param>>
            cd build/<<parameters.build_type>> && <<parameters.build_tool>> install
  run-test:
    parameters:
      build_type:
        type: string
        default: "Release"
      build_tool:
        type: string
        default: "make"
    steps:
      - run:
          name: Smoke test
          command: |
            export PATH="$HOME/retractordb/bin:$PATH"
            cd build/<< parameters.build_type >> && << parameters.build_tool >> showelf
            xretractor -h
            xqry -h
            xtrdb -h
      - run:
          name: Integration & Unit test
          command: |
            export PATH="$HOME/retractordb/bin:$PATH"
            cd build/<< parameters.build_type >>/test && ctest -V --output-junit test_results.xml
      - store_test_results:
          path: build/<< parameters.build_type >>/test
      - store_artifacts:
          path: build/<< parameters.build_type >>/test/test_results.xml
          destination: test_results.xml
  run-cppcheck:
    parameters:
      build_type:
        type: string
        default: "Release"
      build_tool:
        type: string
        default: "make"
    steps:
      - run:
          name: Static analysis
          command: |
            cd build/<< parameters.build_type >> && << parameters.build_tool >> cppcheck
  run-package:
    parameters:
      build_type:
        type: string
        default: "Release"
      build_tool:
        type: string
        default: "make"
    steps:
      - run:
          name: Package
          command: |
            cd build/<<parameters.build_type>> && <<parameters.build_tool>> packages

jobs:
  build-release-ninja-mydocker:
    working_directory: ~/retractordb
    executor: debian-mydocker
    steps:
      - checkout:
          method: blobless
      - check-skipci
      - prep-env:
          use_ninja: true
      - conan-install:
          build_param: --build missing
          build_tool: ninja
      - conan-build:
          build_param: --build missing
          build_tool: ninja
      - run-test:
          build_tool: ninja

  build-debug-ninja-mydocker:
    working_directory: ~/retractordb
    executor: debian-mydocker
    steps:
      - checkout:
          method: blobless
      - check-skipci
      - prep-env:
          use_ninja: true
      - conan-install:
          build_type: Debug
          build_param: --build missing
          build_tool: ninja
      - conan-build:
          build_type: Debug
          build_param: --build missing
          build_tool: ninja
      - run-test:
          build_type: Debug
          build_tool: ninja

  build-release:
    working_directory: ~/retractordb
    executor: ubuntu-docker
    steps:
      - checkout:
          method: blobless
      - check-skipci
      - prep-env-ci
      - conan-install:
          build_param: --build missing
      - conan-build:
          build_param: --build missing
      - run-test
      - run-package

  build-debug:
    working_directory: ~/retractordb
    executor: ubuntu-docker
    steps:
      - checkout:
          method: blobless
      - check-skipci
      - prep-env-ci
      - conan-install:
          build_type: Debug
          build_param: --build missing
      - conan-build:
          build_type: Debug
          build_param: --build missing
      - run-test:
          build_type: Debug

  build-debug-ninja:
    working_directory: ~/retractordb
    executor: ubuntu-docker
    steps:
      - checkout:
          method: blobless
      - check-skipci
      - prep-env-ci:
          use_ninja: true
      - conan-install:
          build_type: Debug
          build_param: --build missing
          build_tool: ninja
      - conan-build:
          build_type: Debug
          build_param: --build missing
          build_tool: ninja
      - run-test:
          build_type: Debug
          build_tool: ninja

  build-ARM:
    parameters:
      build_type:
        type: string
        default: "Debug"
      build_tool:
        type: string
        default: "make"
    working_directory: ~/retractordb
    executor: ubuntu-machine-arm
    steps:
      - checkout:
          method: blobless
      - check-skipci
      - prep-env-ci
      - conan-install:
          build_type: << parameters.build_type >>
          build_param: --build missing
      - conan-build:
          build_type: << parameters.build_type >>
          build_param: --build missing
          build_tool: << parameters.build_tool >>
      - run-test:
          build_type: << parameters.build_type >>
          build_tool: << parameters.build_tool >>
